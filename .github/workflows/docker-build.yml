name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # 当 main 分支有更新时触发
  workflow_dispatch:     # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登录 Docker Hub (你需要在 GitHub Secrets 中配置 DOCKERHUB_USERNAME 和 DOCKERHUB_TOKEN)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. 设置 QEMU (支持多架构，虽然 D2550 是 amd64，但加上更通用)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64 # 明确指定 amd64 架构，适配你的 D2550
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/openclaw-zero-token:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/openclaw-zero-token:${{ github.sha }}
