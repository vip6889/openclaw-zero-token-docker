name: Build and Push Docker Image (Dev Mode)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许在 GitHub 网页手动触发

env:
  REGISTRY: docker.io
  # 请修改为您的 Docker Hub 用户名和仓库名
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/openclaw-zero-token-dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # 明确设置环境，让 Actions 在 Node.js 24 上运行，避免警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 可选：启用更详细的构建日志
          provenance: false
